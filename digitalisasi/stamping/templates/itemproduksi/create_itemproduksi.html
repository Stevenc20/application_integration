{% extends "base_template/base.html" %}
{% block content %}

<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Buat Item Produksi Baru</h5>
            </div>
            <div class="card-body">
                <form method="POST" id="itemProduksiForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="job_number" class="form-label">Job Number</label>
                        <input type="text" class="form-control" id="job_number" name="job_number" value="{{ form_data.job_number }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="part_number" class="form-label">Part Number</label>
                        <input type="text" class="form-control" id="part_number" name="part_number" value="{{ form_data.part_number }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="customer" class="form-label">Customer</label>
                        <input type="text" class="form-control" id="customer" name="customer" value="{{ form_data.customer }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="cycle_time" class="form-label">Cycle Time (detik/menit)</label>
                        <input type="number" step="0.01" class="form-control" id="cycle_time" name="cycle_time" value="{{ form_data.cycle_time|default:'0.0' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Production Lines Digunakan</label>
                        {% for line in productionlineobj %} 
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="production_lines" value="{{ line.id }}" id="line-{{ line.id }}">
                                <label class="form-check-label" for="line-{{ line.id }}">
                                    {{ line.namaline }} (Shift: {{ line.shift }}, Kapasitas: {{ line.kapasitasline }})
                                </label>
                            </div>
                        {% endfor %}
                    </div>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                    <a href="{% url 'itemproduksi' %}" class="btn btn-secondary">Batal</a>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Skrip untuk validasi agar minimal satu checkbox dipilih
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('itemProduksiForm');
    form.addEventListener('submit', function(event) {
        const checkedBoxes = document.querySelectorAll('input[name="production_lines"]:checked');
        if (checkedBoxes.length === 0) {
            event.preventDefault(); // Mencegah form untuk submit
            alert('Harap pilih minimal satu Production Line.');
        }
    });
});
</script>

{% endblock %}
