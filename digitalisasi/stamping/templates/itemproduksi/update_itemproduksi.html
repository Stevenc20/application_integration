{% extends "base_template/base.html" %}
{% block content %}

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Update Item Produksi: {{ item.part_number }}</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="job_number" class="form-label">Job Number</label>
                <input type="text" class="form-control" name="job_number" value="{{ item.job_number }}" required>
            </div>
             <div class="mb-3">
                <label for="part_number" class="form-label">Part Number</label>
                <input type="text" class="form-control" name="part_number" value="{{ item.part_number }}" required>
            </div>
             <div class="mb-3">
                <label for="customer" class="form-label">Customer</label>
                <input type="text" class="form-control" name="customer" value="{{ item.customer }}" required>
            </div>
             <div class="mb-3">
                <label for="cycle_time" class="form-label">Cycle Time</label>
                <input type="number" step="0.01" class="form-control" name="cycle_time" value="{{ item.cycle_time }}" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Production Lines Digunakan</label>
                {% for line in productionlineobj %} 
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="production_lines" value="{{ line.id }}" id="line-{{ line.id }}"
                            {% if line in item.production_lines.all %}checked{% endif %}>
                        <label class="form-check-label" for="line-{{ line.id }}">
                            {{ line.namaline }} (Shift: {{ line.shift }})
                        </label>
                    </div>
                {% endfor %}
            </div>
            
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="{% url 'itemproduksi' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>

{% endblock %}
