{% extends "base_template/base.html" %}

{% block title %}{% if break_obj %}Update{% else %}Tambah{% endif %} Jadwal Istirahat{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">{% if break_obj %}Update{% else %}Tambah{% endif %} Jadwal Istirahat</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="nama_istirahat" class="form-label">Nama Istirahat</label>
                <input type="text" name="nama_istirahat" id="nama_istirahat" class="form-control" 
                       value="{{ break_obj.nama_istirahat|default:'Istirahat' }}" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="waktu_mulai" class="form-label">Waktu Mulai</label>
                    <input type="time" name="waktu_mulai" id="waktu_mulai" class="form-control" 
                           value="{{ break_obj.waktu_mulai|time:'H:i' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="waktu_selesai" class="form-label">Waktu Selesai</label>
                    <input type="time" name="waktu_selesai" id="waktu_selesai" class="form-control" 
                           value="{{ break_obj.waktu_selesai|time:'H:i' }}" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="shift" class="form-label">Shift</label>
                    <input type="number" name="shift" id="shift" class="form-control" 
                           value="{{ break_obj.shift|default:'1' }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="hari" class="form-label">Hari Spesifik</label>
                    <select name="hari" id="hari" class="form-select">
                        <option value="">Berlaku Setiap Hari</option>
                        {% for code, name in choices_hari %}
                        <option value="{{ code }}" {% if code == break_obj.hari %}selected{% endif %}>
                            {{ name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Simpan</button>
            <a href="{% url 'break_time_list' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
