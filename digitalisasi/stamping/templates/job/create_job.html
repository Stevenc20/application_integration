{% extends "base_template/base.html" %}

{% block title %}Data Job{% endblock %}

{% block content %}
<div class="row mb-6 gy-6">
<div class="col-xxl">
    <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
            <h5 class="mb-0">Create Data Job & Production Plan</h5>
        </div>
        <div class="card-body">
            <form action="" method="post"> 
                {% csrf_token %}
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">Production Line</label>
                    <div class="col-sm-10">
                    <select name="id_productionline" class="form-control" required>
                        <option value="" disabled selected>-- Pilih Line & Shift --</option>
                        {% for line in dataproductionline %}
                            <option value="{{ line.id }}">{{ line.namaline }} - Shift {{ line.shift }}</option>
                        {% endfor %}
                    </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">Nama Karyawan</label>
                    <div class="col-sm-10">
                        <select name="id_karyawan" class="form-control" required>
                            <option value="" disabled selected>-- Pilih Karyawan --</option>
                            {% for item in datakaryawan %}
                            <option value="{{ item.id_karyawan }}">{{ item.nama_karyawan }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3"><label class="form-label">Tanggal Produksi</label><input type="date" name="date" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">GSPH Plan</label><input type="number" name="gsph_plan" class="form-control" placeholder="Masukkan Jumlah GSPH"></div>
                        <div class="mb-3"><label class="form-label">Stroke Plan</label><input type="number" name="stroke_plan" class="form-control" placeholder="Masukkan Jumlah Stroke Plan"></div>
                        <div class="mb-3"><label class="form-label">Repair Plan (%)</label><input type="number" step="0.01" name="repair_plan" class="form-control" placeholder="Contoh: 5.50"></div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3"><label class="form-label">Reject Plan (%)</label><input type="number" step="0.01" name="reject_plan" class="form-control" placeholder="Contoh: 2.00" ></div>
                        <div class="mb-3"><label class="form-label">Idle Plan (Menit)</label><input type="number" name="idle_plan" class="form-control" placeholder="Masukkan Jumlah Idle Plan" ></div>
                        <div class="mb-3"><label class="form-label">Man Power</label><input type="number" name="mp" class="form-control" placeholder="Masukkan Jumlah MP" ></div>
                    </div>
                </div>
                <br>

                <div id="tambahdetailjob" class="mt-3">
                    <div class="detail-row mb-4" style="border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #fafafa;">
                        <h5>Detail Job 1</h5>
                        
                        <div class="form-group row mb-3">
                            <label class="col-sm-3 col-form-label">Item Produksi</label>
                            <div class="col-sm-9">
                                <select name="id_item_produksi" class="form-control item-produksi-select" required onchange="updateCycleTime(this)">
                                    {% for item in dataitemproduksi %}
                                    <option value="{{ item.id }}">{{ item.job_number }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="form-group row mb-3">
                            <label class="col-sm-3 col-form-label">Machine Used</label>
                            <div class="col-sm-9 machine-container">{% for m in machines %}<div class="form-check form-check-inline"><input type="checkbox" class="form-check-input" name="machine_used_0" value="{{ m.id }}"><label class="form-check-label">{{ m.code }}</label></div>{% endfor %}</div>
                        </div>

                        <div class="form-group row mb-3">
                            <label class="col-sm-3 col-form-label">Plan Qty</label>
                            <div class="col-sm-9"><input type="number" name="plan_qty" class="form-control" placeholder="Masukkan Plan Qty" required></div>
                        </div>

                        <div class="form-group row mb-3">
                            <label class="col-sm-3 col-form-label">Plan CT</label>
                            <div class="col-sm-9">
                                <input type="number" step="0.01" name="plan_ct_display" class="form-control plan-ct-input" placeholder="Otomatis terisi" readonly>
                            </div>
                        </div>
                        <br>
                        <button class="btn btn-danger btn-sm" type="button" onclick="deleterow(this)">Delete Detail Job</button>
                    </div>
                </div>
                <button type="button" class="btn btn-success btn-sm mb-3" onclick="tambahDetailJob()"><i class="mdi mdi-plus"></i> Tambah Detail Job</button>
                <br>
                <div class="text-end">
                <button class="btn btn-primary btn-sm" type="submit">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>
</div>

<script>
const itemsData = JSON.parse('{{ items_json_str|escapejs }}');
const machinesData = JSON.parse('{{ machines_json_str|escapejs }}');
let detailJobCounter = 1;

// Fungsi untuk menambah baris detail job baru
function tambahDetailJob() {
    const container = document.getElementById('tambahdetailjob');
    const templateRow = container.querySelector('.detail-row');
    const newRow = templateRow.cloneNode(true);

    newRow.querySelector('h5').textContent = `Detail Job ${detailJobCounter + 1}`;
    newRow.querySelector('select[name="id_item_produksi"]').selectedIndex = 0;
    newRow.querySelector('input[name="plan_qty"]').value = '';
    newRow.querySelector('.plan-ct-input').value = '';

    const machineCheckboxes = newRow.querySelectorAll('input[type="checkbox"]');
    machineCheckboxes.forEach(checkbox => {
        checkbox.name = `machine_used_${detailJobCounter}`;
        checkbox.checked = false;
    });

    container.appendChild(newRow);
    detailJobCounter++;
}

// Fungsi untuk menghapus baris
function deleterow(button) {
    const container = document.getElementById('tambahdetailjob');
    if (container.querySelectorAll('.detail-row').length > 1) {
        button.closest('.detail-row').remove();
    } else {
        alert('Tidak bisa menghapus baris terakhir.');
    }
}

// Fungsi untuk mengisi Plan CT secara otomatis
function updateCycleTime(selectElement) {
    const selectedItemId = selectElement.value;
    const parentRow = selectElement.closest('.detail-row');
    const planCtInput = parentRow.querySelector('.plan-ct-input');
    const selectedItem = itemsData.find(item => item.id == selectedItemId);
    
    if (selectedItem) {
        planCtInput.value = selectedItem.cycle_time;
    } else {
        planCtInput.value = '';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const firstSelect = document.querySelector('.item-produksi-select');
    if (firstSelect) {
        updateCycleTime(firstSelect);
    }
});
</script>

{% endblock %}
