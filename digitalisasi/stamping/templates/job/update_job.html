{% extends "base_template/base.html" %}

{% block title %}Update Job{% endblock %}

{% block content %}
<div class="row mb-6 gy-6">
  <div class="col-xxl">
    <div class="card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <h5 class="mb-0">Update Job</h5>
        <small class="text-body-secondary float-end">Edit Data Job</small>
      </div>
      <div class="card-body">
        <form action="" method="post">
          {% csrf_token %}
          <!-- Production Line -->
          <div class="form-group row mb-3">
            <label class="col-sm-3 col-form-label" for="id_productionline" >Production Line</label>
            <div class="col-sm-9">
              <select name="id_productionline" class="form-control" required>
                {% for item in dataproductionline %}
                <option value="{{ item.id }}" 
                  {% if item.id == jobobj.id_productionline.id %}selected{% endif %}>
                  {{ item.namaline }} - Shift {{item.shift}}
                </option>
              {% endfor %}
              </select>
            </div>
          </div>

          <!-- Karyawan -->
          <div class="form-group row mb-3">
            <label class="col-sm-3 col-form-label" for="id_karyawan">Karyawan</label>
            <div class="col-sm-9">
              <select name="id_karyawan" class="form-control" required>
                {% for item in datakaryawan %}
                <option value="{{ item.id_karyawan }}" 
                  {% if item == jobobj.id_karyawan %}selected{% endif %}>
                  {{ item.nama_karyawan }}
                </option>
              {% endfor %}
              </select>
            </div>
          </div>

          <!-- Tanggal -->
          <div class="form-group row mb-3">
            <label class="col-sm-3 col-form-label">Tanggal</label>
            <div class="col-sm-9">
              <input type="date" name="date" class="form-control" value="{{ tanggal }}" required>
            </div>
          </div>

          <br>
          <button type="submit" class="btn btn-primary">Update</button>
          <a href="{% url 'job' %}" class="btn btn-secondary">Batal</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
