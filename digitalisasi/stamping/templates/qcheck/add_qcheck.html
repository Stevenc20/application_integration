{% extends "base_template/base.html" %}

{% block title %}Tambah Q Check{% endblock %}

{% block content %}
<div class="card p-4" style="max-width: 600px; margin: auto;">
    <h4 class="fw-bold mb-3">Tambah Q Check - Job {{ detail_job.id_itemproduksi.job_number }}</h4>

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label for="jenis_qcheck" class="form-label">Jenis Q Check</label>
            <select name="jenis_qcheck" id="jenis_qcheck" class="form-select" required>
                <option value="">-- Pilih Jenis Q Check --</option>
                {% for code, label in qc_types %}
                <option value="{{ code }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="hasil_qcheck" class="form-label">Hasil Q Check</label>
            <input type="text" name="hasil_qcheck" id="hasil_qcheck" class="form-control" required placeholder="Contoh: OK / NG">
        </div>

        <div class="mb-3">
            <label for="keterangan" class="form-label">Keterangan</label>
            <textarea name="keterangan" id="keterangan" rows="3" class="form-control"></textarea>
        </div>

        <div class="d-flex justify-content-between">
            <a href="{% url 'list_qcheck' detail_job.id_detailjob %}" class="btn btn-secondary">Kembali</a>
            <button type="submit" class="btn btn-primary">Simpan & Mulai Timer</button>
        </div>
    </form>
</div>
{% endblock %}
