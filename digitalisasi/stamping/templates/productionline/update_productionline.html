{% extends "base_template/base.html" %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Update Production Line: {{ line.namaline }} - Shift {{ line.shift }}</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="namaline" class="form-label">Nama Line</label>
                <input type="text" class="form-control" id="namaline" name="namaline" value="{{ line.namaline }}" required>
            </div>
            <div class="mb-3">
                <label for="shift" class="form-label">Shift</label>
                <input type="number" class="form-control" id="shift" name="shift" value="{{ line.shift }}" required>
            </div>
            <div class="mb-3">
                <label for="kapasitasline" class="form-label">Kapasitas</label>
                <input type="number" class="form-control" id="kapasitasline" name="kapasitasline" value="{{ line.kapasitasline }}" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="{% url 'productionline' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
