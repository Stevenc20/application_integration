{% extends "base_template/base.html" %}
{% block title %}Tambah Achievement{% endblock %}

{% block content %}
<div class="container mt-4">
  <h3>Tambah Achievement - Detail Job {{ datadetailjob.id_detailjob }}</h3>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Simpan</button>
    <a href="{% url 'rekap_achievement' datadetailjob.id_detailjob %}" class="btn btn-secondary">Kembali</a>
  </form>
</div>
{% endblock %}
